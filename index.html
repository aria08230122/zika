<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字卡机器人 · 自动回复</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: #fffaf3;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 8px 16px rgba(0,0,0,0.06);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
            max-height: 800px;
        }

        /* 头部 */
        .header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid #eee6db;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #4a3f35;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header h1 span {
            background: #e8ddd0;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 400;
            color: #5e4f40;
        }

        /* 字卡库管理区 */
        .card-library {
            background: #f4ede3;
            margin: 0 16px 16px;
            padding: 16px;
            border-radius: 24px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .library-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #6b5f53;
            font-weight: 500;
        }
        .library-title .count {
            background: #d9cdbc;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 12px;
            color: #3e342b;
        }
        .add-card {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .add-card input {
            flex: 1;
            background: white;
            border: 1px solid #e0d5c7;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            color: #2c2823;
        }
        .add-card input:focus {
            border-color: #b5a38f;
            box-shadow: 0 0 0 3px rgba(181, 163, 143, 0.2);
        }
        .add-card button {
            background: #d6c5b2;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 500;
            color: #3f362e;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            border: 1px solid #cabba9;
        }
        .add-card button:hover {
            background: #cab9a4;
        }

        /* 字卡列表（横向滚动） */
        .card-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 90px;
            overflow-y: auto;
            padding: 4px 2px;
        }
        .card-item {
            background: white;
            border-radius: 30px;
            padding: 6px 14px 6px 16px;
            font-size: 14px;
            color: #3f362e;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #e2d6c8;
        }
        .card-item .delete {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e8ddd0;
            color: #7e6e5d;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            transition: 0.1s;
            border: none;
            padding: 0;
        }
        .card-item .delete:hover {
            background: #d1beab;
            color: #3f3429;
        }

        /* 聊天记录区 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.bot {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .user .bubble {
            background: #d1e0d3;
            color: #1f3b2c;
            border-bottom-right-radius: 4px;
        }
        .bot .bubble {
            background: white;
            color: #2c2a27;
            border: 1px solid #ece2d7;
            border-bottom-left-radius: 4px;
        }
        .time {
            font-size: 11px;
            color: #9f9285;
            margin: 4px 12px 0;
        }

        /* 空状态 */
        .empty-library-note {
            color: #b1a392;
            font-size: 13px;
            text-align: center;
            padding: 8px;
            font-style: italic;
        }

        /* 底部输入 */
        .input-area {
            background: #faf5ed;
            border-top: 1px solid #e7ded2;
            padding: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            background: white;
            border: 1px solid #ddd0c0;
            border-radius: 40px;
            padding: 12px 18px;
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #b9aa98;
        }
        .input-area button {
            background: #b9aa98;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            white-space: nowrap;
        }
        .input-area button:hover {
            background: #a6927d;
        }
        .input-area button:active {
            transform: scale(0.97);
        }
    </style>

</head>
<body>
<div class="container">
    <!-- 头部 -->
    <div class="header">
        <h1>
            🧃 字卡工坊
            <span>自动回复机</span>
        </h1>
    </div>

    <!-- 字卡库管理 -->
    <div class="card-library">
        <div class="library-title">
            <span>📇 我的字卡库</span>
            <span class="count" id="cardCount">0 张</span>
        </div>
        <div class="add-card">
            <input type="text" id="newCardInput" placeholder="输入新字卡，比如「萧小四」" maxlength="30">
            <button id="addCardBtn">＋ 添加</button>
        </div>
        <div class="card-list" id="cardList">
            <!-- 动态生成字卡 -->
        </div>
        <div id="emptyLibraryMsg" class="empty-library-note" style="display: none;">✨ 字卡库空空，快添加几张吧</div>
    </div>

    <!-- 聊天记录展示区 -->
    <div class="chat-area" id="chatArea">
        <!-- 示例初始消息会通过JS生成 -->
    </div>

    <!-- 底部发送消息 -->
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="写点什么..." maxlength="100">
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    (function() {
        // ---------- 数据存储 key ----------
        const STORAGE_CARDS = 'wordcard_library';
        const STORAGE_CHAT = 'wordcard_chat';

        // ---------- 默认初始字卡 ----------
        const DEFAULT_CARDS = ['萧小四', '沉沉正在输入', '小黄油脆苹果', '收到啦', '哈哈哈'];

        // ---------- 当前状态 ----------
        let cardLibrary = [];
        let chatHistory = [];   // 存储 { role: 'user' 或 'bot', content: '...', time: 'HH:MM' }

        // ---------- DOM 元素 ----------
        const cardListEl = document.getElementById('cardList');
        const cardCountEl = document.getElementById('cardCount');
        const emptyMsgEl = document.getElementById('emptyLibraryMsg');
        const chatAreaEl = document.getElementById('chatArea');
        const newCardInput = document.getElementById('newCardInput');
        const addCardBtn = document.getElementById('addCardBtn');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // ---------- 辅助函数：获取当前时间字符串 (HH:MM) ----------
        function getCurrentTimeString() {
            const d = new Date();
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        // ---------- 加载/初始化数据 ----------
        function loadData() {
            // 读取字卡库
            const storedCards = localStorage.getItem(STORAGE_CARDS);
            if (storedCards) {
                try {
                    cardLibrary = JSON.parse(storedCards);
                    if (!Array.isArray(cardLibrary)) cardLibrary = [];
                } catch { cardLibrary = []; }
            } else {
                cardLibrary = [...DEFAULT_CARDS];
            }

            // 读取聊天记录
            const storedChat = localStorage.getItem(STORAGE_CHAT);
            if (storedChat) {
                try {
                    chatHistory = JSON.parse(storedChat);
                    if (!Array.isArray(chatHistory)) chatHistory = [];
                } catch { chatHistory = []; }
            } else {
                // 默认两条打招呼消息
                chatHistory = [
                    { role: 'bot', content: '嗨！往字卡库里加点东西吧，我会随机回复哦', time: getCurrentTimeString() },
                ];
            }
        }

        // ---------- 保存数据到 localStorage ----------
        function saveCards() {
            localStorage.setItem(STORAGE_CARDS, JSON.stringify(cardLibrary));
        }
        function saveChat() {
            localStorage.setItem(STORAGE_CHAT, JSON.stringify(chatHistory));
        }

        // ---------- 渲染字卡库 (横向标签) ----------
        function renderCardLibrary() {
            cardListEl.innerHTML = '';  // 清空
            if (cardLibrary.length === 0) {
                emptyMsgEl.style.display = 'block';
                cardCountEl.innerText = '0 张';
                return;
            }
            emptyMsgEl.style.display = 'none';
            cardCountEl.innerText = cardLibrary.length + ' 张';

            cardLibrary.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card-item';
                cardDiv.innerHTML = `
                    ${card}
                    <span class="delete" data-index="${index}">✕</span>
                `;
                cardListEl.appendChild(cardDiv);
            });

            // 给每个删除按钮绑定事件 (事件委托也可以，但直接绑定更清晰)
            document.querySelectorAll('.card-item .delete').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const idx = this.getAttribute('data-index');
                    if (idx !== null) deleteCard(parseInt(idx));
                });
            });
        }

        // ---------- 删除字卡 ----------
        function deleteCard(index) {
            if (index >= 0 && index < cardLibrary.length) {
                cardLibrary.splice(index, 1);
                saveCards();
                renderCardLibrary();
            }
        }

        // ---------- 添加字卡 ----------
        function addCard(text) {
            const trimmed = text.trim();
            if (trimmed === '') return false;
            // 避免完全重复的可以加，但去掉极端重复控制（保持自由）
            cardLibrary.push(trimmed);
            saveCards();
            renderCardLibrary();
            return true;
        }

        // ---------- 机器人随机回复 ----------
        function getRandomBotReply() {
            if (cardLibrary.length === 0) {
                return '🧩 字卡库空空如也~ 先添加几张吧';
            }
            const randomIndex = Math.floor(Math.random() * cardLibrary.length);
            return cardLibrary[randomIndex];
        }

        // ---------- 添加一条聊天消息 (并自动保存、滚动) ----------
        function addChatMessage(role, content) {
            const time = getCurrentTimeString();
            chatHistory.push({ role, content, time });
            saveChat();
            renderChatArea();
        }

        // ---------- 渲染所有聊天记录 ----------
        function renderChatArea() {
            chatAreaEl.innerHTML = '';
            if (chatHistory.length === 0) {
                // 几乎不会发生，但保留防御
                return;
            }

            chatHistory.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role}`;

                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'bubble';
                bubbleDiv.textContent = msg.content;

                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                timeDiv.textContent = msg.time;

                messageDiv.appendChild(bubbleDiv);
                messageDiv.appendChild(timeDiv);
                chatAreaEl.appendChild(messageDiv);
            });

            // 自动滚动到底部
            chatAreaEl.scrollTop = chatAreaEl.scrollHeight;
        }

        // ---------- 处理发送消息（用户主动发送） ----------
        function handleSendMessage() {
            const userMsg = messageInput.value.trim();
            if (userMsg === '') return;

            // 1. 添加用户消息
            addChatMessage('user', userMsg);
            messageInput.value = '';   // 清空

            // 2. 延迟一点点让用户体验更自然 (模拟机器思考)
            setTimeout(() => {
                const botReply = getRandomBotReply();
                addChatMessage('bot', botReply);
            }, 200);
        }

        // ---------- 初始化事件绑定 ----------
        function bindEvents() {
            addCardBtn.addEventListener('click', () => {
                const success = addCard(newCardInput.value);
                if (success) newCardInput.value = '';
            });

            newCardInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const success = addCard(newCardInput.value);
                    if (success) newCardInput.value = '';
                }
            });

            sendBtn.addEventListener('click', handleSendMessage);

            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSendMessage();
                }
            });
        }

        // ---------- 启动一切 ----------
        function init() {
            loadData();
            renderCardLibrary();
            renderChatArea();
            bindEvents();
        }

        init();
    })();
</script>
</body>
</html>
```
