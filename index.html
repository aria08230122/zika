<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>念培的字卡网站</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root{
    --app-height:100dvh;
    --header-color:#d2e6ec;
    --bubble-font-size:.85rem;
    --name-font-size:.8rem;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}
body{
    background:#cbc6bc;
    min-height:100svh;
    height:var(--app-height);
}
button,input,select{
    font:inherit;
}
img{
    user-select:none;
    -webkit-user-drag:none;
}
.app{
    width:100%;
    height:var(--app-height);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
}
.chat{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    min-height:0;
}

/* loader */
.startup-screen{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,.33), transparent 30%),
        radial-gradient(circle at 82% 78%, rgba(255,255,255,.2), transparent 34%),
        linear-gradient(135deg,var(--loader-bg1,#d8d1c9),var(--loader-bg2,#ece6df));
    background-size:160% 160%;
    animation:loaderBg 10s ease-in-out infinite alternate;
    transition:opacity .9s ease, visibility .9s ease, filter .9s ease;
}
.startup-screen::before,
.startup-screen::after{
    content:"";
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    filter:blur(12px);
}
.startup-screen::before{
    width:52vmax;
    height:52vmax;
    left:-10vmax;
    top:-10vmax;
    background:radial-gradient(circle,var(--loader-halo,rgba(180,160,145,.22)),transparent 68%);
    animation:floatBlob 10s ease-in-out infinite;
}
.startup-screen::after{
    width:42vmax;
    height:42vmax;
    right:-8vmax;
    bottom:-10vmax;
    background:radial-gradient(circle,var(--loader-halo-2,rgba(150,165,155,.18)),transparent 70%);
    animation:floatBlob 12s ease-in-out infinite reverse;
}
.startup-screen.hide{
    opacity:0;
    visibility:hidden;
    filter:blur(12px);
}
.startup-card{
    position:relative;
    z-index:1;
    min-width:260px;
    padding:30px 36px;
    border-radius:30px;
    background:rgba(255,255,255,.34);
    border:1px solid rgba(255,255,255,.45);
    box-shadow:0 18px 50px rgba(0,0,0,.08);
    backdrop-filter:blur(12px);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    transform:translateY(0) scale(1);
    transition:transform .9s ease, opacity .9s ease, filter .9s ease;
    animation:loaderCardIn 1.1s ease both;
}
.startup-screen.hide .startup-card{
    transform:translateY(12px) scale(.98);
    opacity:0;
    filter:blur(8px);
}
.startup-icon{
    width:74px;
    height:74px;
    color:var(--loader-accent,#b49a8a);
    animation:loaderIconFloat 2.8s ease-in-out infinite;
}
.startup-icon svg{
    width:100%;
    height:100%;
    stroke:currentColor;
    fill:none;
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
}
.startup-text{
    color:var(--loader-text,#6a6059);
    font-size:1rem;
    letter-spacing:.08em;
}
.startup-line{
    width:136px;
    height:4px;
    border-radius:999px;
    overflow:hidden;
    position:relative;
    background:rgba(255,255,255,.45);
}
.startup-line::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:42%;
    border-radius:999px;
    background:linear-gradient(90deg,transparent,var(--loader-accent,#b49a8a),transparent);
    animation:startupSlide 1.55s infinite ease-in-out;
}
@keyframes startupSlide{
    0%{transform:translateX(-120%)}
    100%{transform:translateX(260%)}
}
@keyframes loaderBg{
    from{background-position:0% 0%}
    to{background-position:100% 100%}
}
@keyframes floatBlob{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(18px,-14px) scale(1.03)}
}
@keyframes loaderIconFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
}
@keyframes loaderCardIn{
    from{opacity:0;transform:translateY(18px) scale(.98)}
    to{opacity:1;transform:translateY(0) scale(1)}
}

/* header */
.chat-header{
    padding:calc(8px + env(safe-area-inset-top)) 12px 8px;
    background:var(--header-color,#d2e6ec);
    border-bottom:1px solid #c0d4db;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    transition:background-color .2s;
}
.peer-info,.self-info{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
}
.peer-info{flex:1}
.self-info{flex:1;justify-content:flex-end}
.avatar{
    width:36px;
    height:36px;
    background:#d1d1d1;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1rem;
    font-weight:500;
    color:#5a5a5a;
    text-transform:uppercase;
    overflow:hidden;
    cursor:pointer;
    flex-shrink:0;
}
.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.info-text{
    display:flex;
    flex-direction:column;
    min-width:0;
}
.peer-info .info-text{align-items:flex-start}
.self-info .info-text{align-items:flex-end}
.name{
    font-size:var(--name-font-size,.8rem);
    font-weight:600;
    color:#5a5a5a;
    cursor:pointer;
    padding:2px 4px;
    border-radius:12px;
    max-width:120px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.name:hover{background:rgba(225,178,178,.16)}
.status{
    font-size:.58rem;
    color:#8a8a8a;
    cursor:pointer;
    padding:1px 4px;
    border-radius:10px;
    max-width:140px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.status:hover{background:rgba(225,178,178,.12)}
.center-icons{
    display:flex;
    gap:8px;
    margin:0 6px;
}
.icon-btn{
    width:36px;
    height:36px;
    border:none;
    border-radius:50%;
    background:transparent;
    color:#8a8a8a;
    cursor:pointer;
    font-size:1.1rem;
    transition:.2s;
}
.icon-btn:hover{background:rgba(225,178,178,.28)}

/* messages */
.messages-container{
    flex:1;
    min-height:0;
    overflow-y:auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    position:relative;
    isolation:isolate;
    background:#f1f5f6;
}
.messages-container::before{
    content:"";
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:var(--chat-bg-image,none);
    background-size:cover;
    background-position:center;
    opacity:var(--chat-bg-opacity,1);
    filter:blur(var(--chat-bg-blur,0px));
    transform:scale(1.05);
}
.messages-container>*{position:relative;z-index:1}
.messages-container::-webkit-scrollbar{width:3px}
.messages-container::-webkit-scrollbar-track{background:#dbe1e2}
.messages-container::-webkit-scrollbar-thumb{background:#b6c4cb;border-radius:4px}
.message-row{display:flex;width:100%}
.message-row.me{justify-content:flex-end}
.message-row.contact{justify-content:flex-start}
.message-bubble{
    max-width:76%;
    padding:8px 12px;
    border-radius:18px;
    font-size:var(--bubble-font-size,.85rem);
    cursor:pointer;
    word-break:break-word;
    transition:transform .08s, background .15s, color .15s;
}
.message-bubble:active{transform:scale(.99)}
.message-bubble.sticker-bubble{
    padding:6px 6px 8px;
}
.message-text{
    white-space:pre-wrap;
}
.message-sticker{
    display:block;
    width:min(46vw,180px);
    max-width:100%;
    border-radius:16px;
    background:#fff;
}
.quote-indicator{
    font-size:calc(var(--bubble-font-size,.85rem) * .9);
    color:#8a8a8a;
    border-left:2px solid #e1b2b2;
    padding-left:6px;
    margin-bottom:5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.message-time{
    margin-top:5px;
    font-size:calc(var(--bubble-font-size,.85rem) * .7);
    color:#8a8a8a;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:4px;
}
.receipt.read{color:#5a9eff}
.typing-indicator{opacity:0;transition:opacity .2s}
.typing-indicator.show{opacity:1}
.typing-bubble{
    background:rgba(219,229,241,.8);
    padding:8px 16px;
    border-radius:24px;
    display:inline-flex;
    gap:4px;
}
.typing-bubble span{
    width:4px;
    height:4px;
    background:#5a5a5a;
    border-radius:50%;
    animation:typing 1.4s infinite;
}
@keyframes typing{
    0%,60%,100%{transform:translateY(0);opacity:.4}
    30%{transform:translateY(-4px);opacity:1}
}
.empty-chat-placeholder{
    margin:auto;
    color:#8a8a8a;
    text-align:center;
    font-size:.95rem;
}

/* footer */
.chat-footer{
    flex-shrink:0;
    padding:8px 12px calc(10px + env(safe-area-inset-bottom));
    background:var(--header-color,#d2e6ec);
    border-top:1px solid #c0d4db;
    display:flex;
    flex-direction:column;
    gap:8px;
}
.quote-preview{
    display:none;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:rgba(255,255,255,.65);
    border:1px solid rgba(184,207,216,.9);
    border-radius:16px;
    padding:8px 10px;
}
.quote-preview.show{display:flex}
.quote-preview-main{
    display:flex;
    align-items:flex-start;
    gap:8px;
    min-width:0;
}
.quote-preview-main i{
    color:#b38585;
    margin-top:2px;
}
.quote-preview-title{
    font-size:.68rem;
    color:#8a8a8a;
}
.quote-preview-text{
    font-size:.8rem;
    color:#4d4943;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:70vw;
}
.quote-preview-close{
    border:none;
    background:transparent;
    width:28px;
    height:28px;
    border-radius:50%;
    cursor:pointer;
    color:#8a8a8a;
    flex-shrink:0;
}
.quote-preview-close:hover{background:rgba(225,178,178,.2)}
.footer-main{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
}
.chat-footer input{
    flex:1;
    min-width:0;
    background:rgba(255,255,255,.84);
    border:1px solid #b8cfd8;
    border-radius:40px;
    padding:10px 16px;
    font-size:var(--bubble-font-size,.85rem);
    outline:none;
}
.footer-btn{
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:#d1d1d1;
    cursor:pointer;
    font-size:1.05rem;
    color:#5a5a5a;
    flex-shrink:0;
}
.footer-btn:hover{background:#e1b2b2;color:#fff}
.footer-btn:disabled,.panel button:disabled{opacity:.55;cursor:not-allowed}

/* overlays */
.overlay{
    position:absolute;
    inset:0;
    z-index:2000;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.1);
    backdrop-filter:blur(2px);
    visibility:hidden;
    opacity:0;
    transition:.22s;
}
.overlay.show{visibility:visible;opacity:1}
.panel{
    width:390px;
    max-width:94%;
    max-height:84vh;
    padding:18px;
    border-radius:28px;
    background:#f1f5f6;
    border:1px solid #d2e6ec;
    overflow-y:auto;
}
.panel-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:#5a5a5a;
    font-weight:600;
    margin-bottom:14px;
}
.panel-header button{
    border:none;
    background:transparent;
    color:#8a8a8a;
    cursor:pointer;
    font-size:1.2rem;
}
.panel-header button:hover{color:#b34e4e}
.panel-footer{
    margin-top:16px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.panel-footer button{
    border:none;
    background:#d1d1d1;
    border-radius:30px;
    padding:8px 18px;
    cursor:pointer;
}
.panel-footer button:hover{
    background:#e1b2b2;
    color:#fff;
}
.soft-tip{
    color:#8a8a8a;
    font-size:.76rem;
}
.soft-input{
    width:100%;
    border:1px solid #d2e6ec;
    background:#fff;
    border-radius:20px;
    padding:10px 12px;
    outline:none;
}
.flex-row{
    display:flex;
    gap:8px;
    align-items:center;
}
.flex-row .soft-input{flex:1}
.soft-select{
    border:1px solid #d2e6ec;
    border-radius:18px;
    padding:10px 12px;
    background:#fff;
    outline:none;
}
.soft-btn{
    border:none;
    background:#d1d1d1;
    border-radius:18px;
    padding:10px 14px;
    cursor:pointer;
}
.soft-btn:hover{
    background:#e1b2b2;
    color:#fff;
}

/* settings */
.double-buttons{
    display:flex;
    gap:12px;
    margin:18px 0;
    flex-wrap:wrap;
}
.big-icon-btn{
    flex:1;
    min-width:100px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    border:none;
    background:#d2e6ec;
    border-radius:20px;
    padding:16px 8px;
    cursor:pointer;
}
.big-icon-btn:hover{
    background:#e1b2b2;
    color:#fff;
}
.slider-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:12px 0;
}
.slider-row label{width:88px;flex-shrink:0}
.color-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
}
.color-row label{width:78px;flex-shrink:0}
.theme-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:14px 0;
}
.theme-item{
    aspect-ratio:1/1;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:.76rem;
    text-shadow:0 0 2px rgba(0,0,0,.3);
}
.receipt-options{
    display:flex;
    gap:14px;
    margin:12px 0;
    flex-wrap:wrap;
}
.receipt-option{
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    padding:5px 12px;
    border-radius:20px;
    background:rgba(255,255,255,.5);
}
.receipt-option.selected{background:#e1b2b2;color:#fff}
.receipt-option input{display:none}
.switch-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin:12px 0;
}
.switch{
    position:relative;
    width:44px;
    height:24px;
    display:inline-block;
}
.switch input{
    opacity:0;
    width:0;
    height:0;
}
.switch .slider{
    position:absolute;
    inset:0;
    background:#ccc;
    border-radius:24px;
    transition:.2s;
}
.switch .slider::before{
    content:"";
    position:absolute;
    left:3px;
    bottom:3px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:#fff;
    transition:.2s;
}
.switch input:checked + .slider{
    background:#e1b2b2;
}
.switch input:checked + .slider::before{
    transform:translateX(20px);
}

/* list items */
.wordcard-item,.contact-item,.status-item{
    background:#ffffffc8;
    border:1px solid #d2e6ec;
    border-radius:24px;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:8px;
}
.wordcard-item.selected{
    border-color:#e1b2b2;
    background:#fff7f7;
}
.wordcard-main{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
    flex:1;
}
.wordcard-check{
    width:20px;
    height:20px;
    display:none;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}
.wordcard-check.show{display:flex}
.wordcard-check input{
    width:16px;
    height:16px;
}
.wordcard-text{
    flex:1;
    min-width:0;
    cursor:pointer;
}
.wordcard-text-main{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.wordcard-group-badge{
    margin-left:8px;
    font-size:.66rem;
    background:#d2e6ec;
    padding:2px 8px;
    border-radius:20px;
}
.wordcard-actions,.contact-actions{
    display:flex;
    align-items:center;
    gap:4px;
}
.wordcard-item button,.contact-item button,.status-item button{
    width:32px;
    height:32px;
    border:none;
    border-radius:50%;
    background:transparent;
    cursor:pointer;
    color:#5a5a5a;
    flex-shrink:0;
}
.wordcard-item button:hover,.contact-item button:hover,.status-item button:hover{
    background:rgba(225,178,178,.24);
}
.wordcard-batchbar{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    margin:0 0 12px;
}
.wordcard-batchbar .soft-btn{
    padding:8px 12px;
    border-radius:16px;
}
.wordcard-batch-count{
    margin-left:auto;
    font-size:.76rem;
    color:#8a8a8a;
}

.contact-item{
    align-items:flex-start;
}
.contact-item.active{
    border-color:#e1b2b2;
    background:#fff7f7;
}
.contact-main{
    flex:1;
    min-width:0;
}
.contact-main strong{
    display:block;
    color:#4a453e;
}
.contact-sub{
    font-size:.72rem;
    color:#8a8a8a;
    margin-top:3px;
}
.pin-contact.active{
    color:#b34e4e;
    background:rgba(225,178,178,.22);
}

/* sticker */
.sticker-toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:12px;
    flex-wrap:wrap;
}
.upload-chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-radius:18px;
    background:#d2e6ec;
    cursor:pointer;
}
.upload-chip:hover{
    background:#e1b2b2;
    color:#fff;
}
.sticker-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}
.sticker-item{
    position:relative;
    background:#fff;
    border:1px solid #d2e6ec;
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
}
.sticker-item:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 16px rgba(0,0,0,.08);
}
.sticker-thumb{
    display:block;
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    background:#f6f6f6;
}
.sticker-name{
    padding:6px 8px 8px;
    font-size:.72rem;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:#5a5a5a;
}
.sticker-delete{
    position:absolute;
    top:6px;
    right:6px;
    width:26px;
    height:26px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.45);
    color:#fff;
    cursor:pointer;
}
.sticker-delete:hover{background:#b34e4e}
.sticker-empty{
    color:#8a8a8a;
    text-align:center;
    padding:26px 0;
}

/* message menu and group menu */
.group-selector-menu{
    position:fixed;
    z-index:3000;
    background:#fff;
    border:1px solid #d2e6ec;
    border-radius:18px;
    box-shadow:0 8px 22px rgba(0,0,0,.14);
    padding:8px;
    min-width:150px;
}
.group-selector-menu button{
    display:block;
    width:100%;
    border:none;
    background:none;
    text-align:left;
    border-radius:14px;
    padding:8px 12px;
    cursor:pointer;
}
.group-selector-menu button:hover:not(:disabled){
    background:#e1b2b2;
    color:#fff;
}
.group-selector-menu button:disabled{
    opacity:.6;
    cursor:default;
}
.message-actions-menu{
    position:fixed;
    z-index:4000;
    background:#fff;
    border:1px solid #d2e6ec;

    background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 42%),

    content:"";

    inset:10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.26);
}
.shuffle-card.c1{animation:shuffle1 1.1s ease-in-out infinite alternate}
.shuffle-card.c2{animation:shuffle2 1.15s ease-in-out infinite alternate}
.shuffle-card.c3{animation:shuffle3 1.2s ease-in-out infinite alternate}
.shuffle-card.c4{animation:shuffle4 1.25s ease-in-out infinite alternate}
.shuffle-card.c5{animation:shuffle5 1.3s ease-in-out infinite alternate}

@keyframes shuffle2{from{transform:translate(-52%,0) rotate(-8deg)}to{transform:translate(-58%,18px) rotate(-15deg)}}
@keyframes shuffle3{from{transform:translate(-50%,0) rotate(0deg)}to{transform:translate(-48%,18px) rotate(6deg)}}

function escapeHtml(s){
    if(s == null) return "";
    return String(s)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
}
function getCurrentTime(){

function getInitials(n){

function hexToRgba(hex, op){
    if(!hex) return `rgba(0,0,0,${op ?? 1})`;
    let value = String(hex).trim();
    if(/^#([0-9a-fA-F]{3})$/.test(value)){
        value = "#" + value.slice(1).split("").map(ch=>ch+ch).join("");
    }
    if(!/^#([0-9a-fA-F]{6})$/.test(value)) return `rgba(0,0,0,${op ?? 1})`;
    const r = parseInt(value.slice(1,3),16);
    const g = parseInt(value.slice(3,5),16);
    const b = parseInt(value.slice(5,7),16);
    return `rgba(${r},${g},${b},${op ?? 1})`;
}
function randomOrientation(){

function pickDifferentIndex(length, storageKey){
    const prev = Number(localStorage.getItem(storageKey));
    let idx = Math.floor(Math.random() * length);
    if(length > 1){
        while(idx === prev){
            idx = Math.floor(Math.random() * length);
        }
    }
    localStorage.setItem(storageKey, String(idx));
    return idx;
}

function normalizeSticker(st, idx){
    if(!st || !st.src) return null;
    return {
        id: st.id || uid("st") + "_" + idx,
        name: String(st.name || "表情包").trim() || "表情包",
        src: st.src,
        builtin: !!st.builtin
    };
}
function normalizeQuote(q){
    if(!q) return null;
    const type = q.type || (q.stickerSrc ? "sticker" : "text");
    return {
        type,
        text: String(q.text || ""),
        stickerName: String(q.stickerName || q.name || "表情包"),
        stickerSrc: q.stickerSrc || q.src || null,
        sender: q.sender || "contact"
    };
}
function normalizeMessage(m){
    const type = m.type || (m.stickerSrc ? "sticker" : "text");
    return {
        sender: m.sender === "me" ? "me" : "contact",
        type,
        text: String(m.text || ""),
        stickerSrc: type === "sticker" ? (m.stickerSrc || m.src || null) : null,
        stickerName: String(m.stickerName || m.name || "表情包"),
        time: m.time || getCurrentTime(),
        quote: normalizeQuote(m.quote),
        receipt: m.receipt || null,
        edited: !!m.edited
    };
}
function normalizeContact(c){
    const now = new Date().toISOString();
    return {
        id: c.id || uid("c"),
        peerName: c.peerName || "新朋友",
        peerAvatar: c.peerAvatar || null,
        peerStatus: c.peerStatus || "在线",
        selfName: c.selfName || "念培",
        selfAvatar: c.selfAvatar || null,
        selfStatus: c.selfStatus || "想喝椰汁",
        createdAt: c.createdAt || now,
        lastActive: c.lastActive || c.createdAt || now,
        pinned: !!c.pinned,
        messages: Array.isArray(c.messages) ? c.messages.map(normalizeMessage) : []
    };
}
function getQuoteDisplayText(q){

    return q.type === "sticker"

}
function getMessagePreview(msg){
    return msg.type === "sticker"
        ? `[表情包] ${msg.stickerName || "表情包"}`

}
function currentQuotePayload(){
    if(!quotedMessage) return null;
    return {
        type: quotedMessage.type,
        text: quotedMessage.text || "",
        stickerName: quotedMessage.stickerName || "表情包",
        stickerSrc: quotedMessage.stickerSrc || null,
        sender: quotedMessage.sender || "contact"
    };
}
function uniqueGroupId(preferred){
    if(preferred && !groups.some(g=>g.id === preferred)) return preferred;
    return uid("g");
}
function uniqueWordCardId(preferred){
    if(preferred && !wordCards.some(c=>c.id === preferred)) return preferred;
    return uid("wc");
}
function ensureGroupByName(name, preferredId){
    const trimmed = String(name || "").trim();
    if(!trimmed) return "default";
    const existing = groups.find(g=>g.name === trimmed);
    if(existing) return existing.id;
    const id = uniqueGroupId(preferredId);
    groups.push({id,name:trimmed});
    return id;
}

    if(!contact){
        renderNoContact();

    }

    if(input) input.disabled = false;
    if(sendBtn) sendBtn.disabled = false;
    if(stickerBtn) stickerBtn.disabled = false;

    renderQuotePreview();

    $("self-name").textContent = contact.selfName || "我";
    $("self-status").textContent = contact.selfStatus || "";

        img.alt = "peer";

    }else{
        peerAv.innerHTML = "";
        peerAv.textContent = getInitials(contact.peerName);
    }
    if(contact.selfAvatar){
        selfAv.textContent = "";

        img.src = contact.selfAvatar;
        img.alt = "self";
        selfAv.appendChild(img);
    }else{
        selfAv.innerHTML = "";
        selfAv.textContent = getInitials(contact.selfName);
    }

    let html = "";
    (contact.messages || []).forEach((msg, idx)=>{
        const bgColor = msg.sender === "me" ? colors.myBubble : colors.otherBubble;
        const textColor = msg.sender === "me" ? colors.myText : colors.otherText;
        const bubbleStyle = `background:${hexToRgba(bgColor, settings.customColors.bubbleOpacity)};color:${textColor};`;
        const quoteHtml = (msg.quote && settings.quoteEnabled)
            ? `<div class="quote-indicator"><i class="fa-solid fa-reply"></i> ${escapeHtml(getQuoteDisplayText(msg.quote))}</div>`
            : "";
        const receiptHtml = (msg.sender === "me" && msg.receipt)
            ? (settings.receiptStyle === "text"
                ? `<span class="receipt">已读</span>`
                : `<span class="receipt ${msg.receipt === "read" ? "read" : ""}"><i class="fa-solid fa-check-double"></i></span>`)
            : "";
        const contentHtml = msg.type === "sticker"
            ? `<img class="message-sticker" src="${escapeHtml(msg.stickerSrc || "")}" alt="${escapeHtml(msg.stickerName || "表情包")}">`
            : `<div class="message-text">${escapeHtml(msg.text || "")}</div>`;
        const metaText = `${msg.time || ""}${msg.edited ? " · 已编辑" : ""}`;

        html += `
            <div class="message-row ${msg.sender === "me" ? "me" : "contact"}" data-msg-idx="${idx}">
                <div class="message-bubble ${msg.type === "sticker" ? "sticker-bubble" : ""}" style="${bubbleStyle}">
                    ${quoteHtml}
                    ${contentHtml}
                    <div class="message-time"><span>${escapeHtml(metaText)}</span>${receiptHtml}</div>
                </div>
            </div>
        `;
    });

    html += `
        <div class="typing-indicator ${pendingReplies > 0 ? "show" : ""}" id="typing-indicator">
            <div class="typing-bubble"><span></span><span></span><span></span></div>
        </div>
    `;

    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;

    container.querySelectorAll(".message-bubble").forEach(bubble=>{
        bubble.addEventListener("click", e=>{
            e.stopPropagation();
            const row = bubble.closest(".message-row");
            if(!row) return;
            const idx = Number(row.dataset.msgIdx);
            const msg = contact.messages[idx];
            if(!msg) return;
            const rect = bubble.getBoundingClientRect();
            const x = e.clientX || rect.left + rect.width / 2;
            const y = e.clientY || rect.bottom;
            showMsgMenu(x, y, idx, msg);
        });
    });
}

function hideMsgMenu(){
    const menu = $("message-actions-menu");
    if(menu){
        menu.style.display = "none";
        menu.style.visibility = "";
    }
    if(activeMenuCloseHandler){
        window.removeEventListener("click", activeMenuCloseHandler, true);
        activeMenuCloseHandler = null;
    }
}
function showMsgMenu(x, y, idx, msg){
    hideMsgMenu();
    const menu = $("message-actions-menu");
    if(!menu) return;

    menu.innerHTML = `
        <button id="action-quote"><i class="fa-solid fa-reply"></i><span>引用消息</span></button>
        <button id="action-edit"><i class="fa-regular fa-pen-to-square"></i><span>编辑消息</span></button>
        <button id="action-delete" class="danger"><i class="fa-regular fa-trash-can"></i><span>删除消息</span></button>
    `;
    menu.style.display = "flex";
    menu.style.visibility = "hidden";

    requestAnimationFrame(()=>{
        const rect = menu.getBoundingClientRect();
        const margin = 10;
        const left = Math.max(margin, Math.min(x, window.innerWidth - rect.width - margin));
        const top = Math.max(margin, Math.min(y, window.innerHeight - rect.height - margin));
        menu.style.left = left + "px";
        menu.style.top = top + "px";
        menu.style.visibility = "visible";
    });

    $("action-quote").onclick = ()=>{
        if(!settings.quoteEnabled){
            alert("你已关闭引用回复功能");
            hideMsgMenu();
            return;
        }
        quotedMessage = {
            type: msg.type,
            text: msg.text || "",
            stickerName: msg.stickerName || "表情包",
            stickerSrc: msg.stickerSrc || null,
            sender: msg.sender || "contact"
        };
        renderQuotePreview();
        refreshInputPlaceholder();
        $("message-input")?.focus();
        hideMsgMenu();
    };

    $("action-edit").onclick = ()=>{
        const contact = getCurrentContact();
        if(!contact) return;
        const current = contact.messages[idx];
        if(!current) return;
        if(current.type === "sticker"){
            alert("表情包消息暂不支持直接编辑，你可以删除后重新发送。");
            hideMsgMenu();
            return;
        }
        const newText = prompt("编辑消息", current.text || "");
        if(newText === null){
            hideMsgMenu();
            return;
        }
        const trimmed = newText.trim();
        if(!trimmed){
            alert("消息内容不能为空");
            return;
        }
        current.text = trimmed;
        current.edited = true;
        touchContact(contact);
        saveAll();
        refreshChat();
        hideMsgMenu();
    };

    $("action-delete").onclick = ()=>{
        const contact = getCurrentContact();
        if(!contact) return;
        if(confirm("删除消息？")){
            contact.messages.splice(idx, 1);
            touchContact(contact);
            saveAll();
            refreshChat();
        }
        hideMsgMenu();
    };

    activeMenuCloseHandler = ev=>{
        if(!menu.contains(ev.target)) hideMsgMenu();
    };
    setTimeout(()=>{
        if(activeMenuCloseHandler){
            window.addEventListener("click", activeMenuCloseHandler, true);
        }
    },10);
}

function getFilteredWordCards(){
    const keyword = wordcardSearchKeyword.trim().toLowerCase();
    let filtered = currentGroupFilter === "all"
        ? [...wordCards]
        : wordCards.filter(c=>c.groupId === currentGroupFilter);

    if(keyword){
        filtered = filtered.filter(card=>{
            const groupName = groups.find(g=>g.id === card.groupId)?.name || "默认";
            return String(card.text).toLowerCase().includes(keyword) || String(groupName).toLowerCase().includes(keyword);
        });
    }
    return filtered;
}

}

function renderGroupTabs(){
    const container = $("group-tabs-container");
    if(!container) return;
    let html = `
        <div class="group-tab ${currentGroupFilter === "all" ? "active" : ""}" data-group="all">
            <i class="fa-solid fa-layer-group"></i> 全部
        </div>
    `;

            if(confirm("删除分组后，分组内字卡会移到默认分组。继续吗？")){
                groups = groups.filter(g=>g.id !== id);
                wordCards.forEach(c=>{ if(c.groupId === id) c.groupId = "default"; });
                if(currentGroupFilter === id) currentGroupFilter = "all";
                saveAll();
                updateGroupSelect();

    if(!select) return;

function openGroupMenu(anchorEl, onChoose, skipId=null){
    const menu = document.createElement("div");
    menu.className = "group-selector-menu";
    const rect = anchorEl.getBoundingClientRect();
    menu.style.left = rect.left + "px";
    menu.style.top = rect.bottom + 6 + "px";

    const usableGroups = groups.filter(g=>skipId ? g.id !== skipId : true);
    if(!usableGroups.length){
        const btn = document.createElement("button");
        btn.textContent = "没有可选分组";
        btn.disabled = true;
        menu.appendChild(btn);
    }else{
        usableGroups.forEach(g=>{
            const btn = document.createElement("button");
            btn.textContent = g.name;
            btn.onclick = ()=>{
                onChoose(g.id);
                menu.remove();
            };
            menu.appendChild(btn);
        });
    }

    document.body.appendChild(menu);
    const remove = ev=>{
        if(!menu.contains(ev.target)){
            menu.remove();
            document.removeEventListener("click", remove);
        }
    };
    setTimeout(()=>document.addEventListener("click", remove),10);
}
function renderWordCards(){
    const listDiv = $("wordcard-list");
    if(!listDiv) return;
    const filtered = getFilteredWordCards();

    if(!filtered.length){
        listDiv.innerHTML = `<div style="color:#8a8a8a;text-align:center;padding:14px 0;">${wordcardSearchKeyword ? "没有匹配字卡" : "暂无字卡"}</div>`;
        updateWordcardBatchBar();
        return;
    }

    let html = "";
    filtered.forEach(card=>{
        const groupName = groups.find(g=>g.id === card.groupId)?.name || "默认";
        const selected = selectedWordCardIds.has(card.id);
        html += `
            <div class="wordcard-item ${selected ? "selected" : ""}" data-id="${card.id}">
                <div class="wordcard-main">
                    <div class="wordcard-check ${wordcardSelectionMode ? "show" : ""}">
                        <input type="checkbox" ${selected ? "checked" : ""}>
                    </div>
                    <div class="wordcard-text">
                        <div class="wordcard-text-main">
                            ${escapeHtml(card.text)}
                            <span class="wordcard-group-badge">${escapeHtml(groupName)}</span>
                        </div>
                    </div>
                </div>
                <div class="wordcard-actions">
                    <button class="move-wordcard" title="移动分组"><i class="fa-solid fa-folder-open"></i></button>
                    <button class="edit-wordcard" title="编辑"><i class="fa-regular fa-pen-to-square"></i></button>
                    <button class="delete-wordcard" title="删除"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            </div>
        `;
    });
    listDiv.innerHTML = html;

    listDiv.querySelectorAll(".wordcard-item").forEach(item=>{
        item.addEventListener("click", e=>{
            if(e.target.closest("button")) return;
            const id = item.dataset.id;
            const card = wordCards.find(c=>c.id === id);
            if(!card) return;

            if(wordcardSelectionMode){
                if(selectedWordCardIds.has(id)) selectedWordCardIds.delete(id);
                else selectedWordCardIds.add(id);
                renderWordCards();
                return;
            }

            const input = $("message-input");
            if(input){
                input.value = card.text;
                closeOverlay("wordcard-overlay");
                input.focus();
            }
        });
    });

    listDiv.querySelectorAll(".edit-wordcard").forEach(btn=>{
        btn.addEventListener("click", e=>{
            e.stopPropagation();
            const id = btn.closest(".wordcard-item")?.dataset.id;
            const card = wordCards.find(c=>c.id === id);
            if(!card) return;
            const newText = prompt("修改字卡", card.text);
            if(newText === null) return;
            const trimmed = newText.trim();
            if(!trimmed) return;
            card.text = trimmed;
            saveAll();
            renderWordCards();
        });
    });

    listDiv.querySelectorAll(".delete-wordcard").forEach(btn=>{
        btn.addEventListener("click", e=>{
            e.stopPropagation();
            const id = btn.closest(".wordcard-item")?.dataset.id;
            if(confirm("删除字卡？")){
                wordCards = wordCards.filter(c=>c.id !== id);
                selectedWordCardIds.delete(id);
                saveAll();
                renderWordCards();
            }
        });
    });

    listDiv.querySelectorAll(".move-wordcard").forEach(btn=>{
        btn.addEventListener("click", e=>{
            e.stopPropagation();
            const id = btn.closest(".wordcard-item")?.dataset.id;
            const card = wordCards.find(c=>c.id === id);
            if(!card) return;
            openGroupMenu(btn, groupId=>{
                card.groupId = groupId;
                saveAll();
                renderWordCards();
            }, card.groupId);
        });
    });

    updateWordcardBatchBar();
}

function importWordCardsFromParsed(data){
    const beforeCount = groups.length;
    let importedCards = 0;
    const groupIdMap = {};

    const registerGroup = raw=>{
        if(!raw) return null;
        let oldId = null;
        let name = "";
        if(typeof raw === "string") name = raw.trim();
        else{
            oldId = raw.id ? String(raw.id) : null;
            name = String(raw.name || "").trim();
        }
        if(!name) return null;

        const existed = groups.find(g=>g.name === name);
        if(existed){
            if(oldId) groupIdMap[oldId] = existed.id;
            return existed.id;
        }
        const id = uniqueGroupId(oldId);
        groups.push({id,name});
        if(oldId) groupIdMap[oldId] = id;
        return id;
    };

    if(data && typeof data === "object" && !Array.isArray(data) && Array.isArray(data.groups)){
        data.groups.forEach(registerGroup);
    }

    let cards = [];
    if(Array.isArray(data)) cards = data;
    else if(data && typeof data === "object") cards = data.wordCards || data.cards || data.items || [];
    else throw new Error("格式错误");
    if(!Array.isArray(cards)) throw new Error("格式错误");

    cards.forEach(item=>{
        let text = "";
        let groupId = "default";
        let preferredId = null;

        if(typeof item === "string"){
            text = item.trim();
        }else if(item && typeof item === "object"){
            preferredId = item.id ? String(item.id) : null;
            text = String(item.text ?? item.content ?? "").trim();
            if(item.groupId){
                const rawId = String(item.groupId);
                if(groups.some(g=>g.id === rawId)) groupId = rawId;
                else if(groupIdMap[rawId]) groupId = groupIdMap[rawId];
            }
            if(groupId === "default" && item.groupName){
                groupId = ensureGroupByName(item.groupName);
            }
        }

        if(text){
            wordCards.push({
                id: uniqueWordCardId(preferredId),
                text,
                groupId
            });
            importedCards++;
        }
    });

    return {
        importedCards,
        importedGroups: groups.length - beforeCount
    };
}
function importWordCards(){
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";
    input.onchange = e=>{
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev=>{
            try{
                const data = JSON.parse(ev.target.result);
                const result = importWordCardsFromParsed(data);
                saveAll();
                updateGroupSelect();
                renderGroupTabs();
                renderWordCards();
                alert(`导入成功：${result.importedCards} 张字卡，${result.importedGroups} 个新分组`);
            }catch(err){
                alert("导入失败：请使用 JSON 数组，或 { groups:[], wordCards:[] } 格式。");
            }
        };
        reader.readAsText(file, "utf-8");
    };
    input.click();
}

function importChats(){
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";
    input.onchange = e=>{
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev=>{
            try{
                const data = JSON.parse(ev.target.result);
                const importedContacts = Array.isArray(data) ? data : data.contacts;
                if(!Array.isArray(importedContacts) || !importedContacts.length){
                    throw new Error("无会话数据");
                }
                if(!confirm("导入会覆盖当前聊天记录，是否继续？")) return;
                contacts = importedContacts.map(normalizeContact);
                selectedContactId = data.selectedContactId && contacts.some(c=>c.id === data.selectedContactId)
                    ? data.selectedContactId
                    : (getSortedContacts()[0]?.id || contacts[0]?.id || null);
                quotedMessage = null;
                pendingReplies = 0;
                saveAll();
                renderContactList();
                refreshChat();
                alert("聊天记录导入成功");
            }catch(err){
                alert("导入失败：请确认文件为本页面导出的聊天记录 JSON。");
            }
        };
        reader.readAsText(file, "utf-8");
    };
    input.click();
}

function renderStatusList(target){

    if(!statuses.length){

    list.innerHTML = statuses.map((st, idx)=>`

            <span style="flex:1;cursor:pointer;">${escapeHtml(st)}</span>
            <div>

                <button class="delete-status"><i class="fa-regular fa-trash-can"></i></button>

    list.querySelectorAll(".status-item").forEach(item=>{

        item.querySelector("span")?.addEventListener("click", ()=>{

            else contact.selfStatus = statuses[idx];
            saveAll();
            refreshChat();
            closeOverlay("status-overlay");

        item.querySelector(".delete-status")?.addEventListener("click", ()=>{
            if(confirm("删除状态？")){
                statuses.splice(idx,1);
                saveAll();
                renderStatusList(target);
            }

    });

function handleStickerUpload(files){
    const validFiles = [...files].filter(file=>file && file.type.startsWith("image/"));
    if(!validFiles.length) return;
    Promise.all(validFiles.map(file=>new Promise((resolve,reject)=>{
        const reader = new FileReader();
        reader.onload = ()=>resolve({
            id: uid("st"),
            name: file.name.replace(/\.[^.]+$/,"").slice(0,14) || "表情包",
            src: reader.result,
            builtin:false
        });
        reader.onerror = reject;
        reader.readAsDataURL(file);
    }))).then(items=>{
        stickers.push(...items);
        saveAll();
        renderStickerGrid();
    }).catch(()=>{
        alert("上传失败，请重试");
    });
}

function shuffleDeck(){
    const arr = [...FULL_TAROT];
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function startTarotDraw(){
    if(tarotDrawing) return;
    const question = $("tarot-question")?.value.trim();
    const mode = $("tarot-spread-mode")?.value || "single";
    const cfg = tarotSpreads[mode] || tarotSpreads.single;

    if(!question){
        alert("请先输入问题");
        return;
    }

    tarotDrawing = true;
    $("tarot-draw-btn").disabled = true;
    renderTarotShuffle();

    setTimeout(()=>{
        const deck = shuffleDeck();
        const drawn = deck.slice(0, cfg.count).map(name=>({
            name,
            orientation: randomOrientation(),
            src: getTarotImage(name)
        }));
        renderTarotSpread(drawn, mode);
        tarotDrawing = false;
        $("tarot-draw-btn").disabled = false;
    }, 1400);
}

function initData(){
    contacts = readJSON("orchard_contacts", []);
    if(!Array.isArray(contacts)) contacts = [];
    contacts = contacts.map(normalizeContact);

    const legacySeedTexts = ["今天果园的椰子熟了"];
    contacts.forEach(contact=>{
        const allText = contact.messages.map(m=>String(m.text || "")).join("||");
        if(legacySeedTexts.some(t=>allText.includes(t))){
            contact.messages = [];
        }
    });

    if(!contacts.length){
        const now = new Date().toISOString();
        contacts = [{
            id:"c1",
            peerName:"陆沉",
            peerAvatar:null,
            peerStatus:"在线",
            selfName:"念培",
            selfAvatar:null,
            selfStatus:"想喝椰汁",
            createdAt:now,
            lastActive:now,
            pinned:false,
            messages:[]
        }];
        selectedContactId = "c1";
    }else{
        selectedContactId = localStorage.getItem("orchard_selected");
        if(!selectedContactId || !contacts.some(c=>c.id === selectedContactId)){
            selectedContactId = getSortedContacts()[0]?.id || contacts[0]?.id || null;
        }
    }

    groups = readJSON("orchard_groups", []);
    if(!Array.isArray(groups)) groups = [];
    if(!groups.some(g=>g.id === "default")) groups.unshift({id:"default", name:"默认"});

    wordCards = readJSON("orchard_wordcards_v2", []);
    if(!Array.isArray(wordCards)) wordCards = [];
    wordCards = wordCards.map((item, i)=>{
        if(typeof item === "string"){
            return {id:uid("wc") + "_" + i, text:item, groupId:"default"};
        }
        return {
            id: item.id || uid("wc") + "_" + i,
            text: String(item.text || ""),
            groupId: item.groupId || "default"
        };
    }).filter(item=>item.text);
    if(!wordCards.length){
        wordCards = [
            {id:"wc1", text:"不来找我", groupId:"default"},
            {id:"wc2", text:"没好好照顾自己", groupId:"default"},
            {id:"wc3", text:"别喝冰的", groupId:"default"}
        ];
    }
    wordCards.forEach(c=>{
        if(!c.groupId || !groups.some(g=>g.id === c.groupId)) c.groupId = "default";
    });

    statuses = readJSON("orchard_statuses", []);
    if(!Array.isArray(statuses) || !statuses.length){
        statuses = ["在线","忙碌","想喝椰汁","发呆","开心"];
    }

    const storedSettings = readJSON("orchard_settings", null);
    if(storedSettings){
        settings = {
            ...defaultSettings,
            ...storedSettings,
            customColors:{
                ...defaultSettings.customColors,
                ...(storedSettings.customColors || {})
            }
        };
    }

    stickers = readJSON("orchard_stickers_v1", []);
    if(!Array.isArray(stickers)) stickers = [];
    stickers = stickers.map(normalizeSticker).filter(Boolean);
    if(!stickers.length){
        stickers = defaultStickerPack();
    }
}

    $("bubble-font-size-val").textContent = e.target.value + "rem";
    saveAll();
    applyBgAndFont();
});

$("open-background").addEventListener("click", ()=>{
    $("bg-opacity").value = settings.bgOpacity;
    $("bg-opacity-val").textContent = settings.bgOpacity;
    $("bg-blur").value = settings.bgBlur;
    $("bg-blur-val").textContent = settings.bgBlur + "px";
    closeOverlay("appearance-overlay");
    openOverlay("background-overlay");
});
$("background-back").addEventListener("click", ()=>{
    closeOverlay("background-overlay");
    openOverlay("appearance-overlay");
});
$("bg-opacity").addEventListener("input", e=>{
    settings.bgOpacity = parseFloat(e.target.value);
    $("bg-opacity-val").textContent = e.target.value;
    saveAll();
    applyBgAndFont();
});
$("bg-blur").addEventListener("input", e=>{
    settings.bgBlur = parseInt(e.target.value, 10);
    $("bg-blur-val").textContent = e.target.value + "px";
    saveAll();
    applyBgAndFont();
});
$("reset-bg").addEventListener("click", ()=>{
    settings.bgImage = null;
    settings.bgOpacity = 1;
    settings.bgBlur = 0;
    saveAll();
    applyBgAndFont();
});
$("bg-upload").addEventListener("change", e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
        settings.bgImage = ev.target.result;
        saveAll();
        applyBgAndFont();
    };
    reader.readAsDataURL(file);
});

/* 聊天设置 */
$("open-chat-settings").addEventListener("click", ()=>{
    $("quote-switch").checked = settings.quoteEnabled;
    $("robot-sticker-switch").checked = !!settings.robotStickerEnabled;

    const radio =
        document.querySelector(`input[name="receipt"][value="${settings.receiptStyle}"]`) ||
        document.querySelector('input[name="receipt"][value="text"]');

    if(radio) radio.checked = true;
    updateReceiptOptionsUI();

    $("min-wait").value = settings.minWait;
    $("min-wait-val").textContent = settings.minWait + "s";
    $("max-wait").value = settings.maxWait;
    $("max-wait-val").textContent = settings.maxWait + "s";

    closeOverlay("settings-main-overlay");
    openOverlay("chat-settings-main-overlay");
});

$("chat-settings-back").addEventListener("click", ()=>{
    closeOverlay("chat-settings-main-overlay");
    openOverlay("settings-main-overlay");
});

$("quote-switch").addEventListener("change", e=>{
    settings.quoteEnabled = e.target.checked;
    if(!settings.quoteEnabled){
        clearQuote();
    }
    saveAll();
    refreshChat();
});

$("robot-sticker-switch").addEventListener("change", e=>{
    settings.robotStickerEnabled = e.target.checked;
    saveAll();
});

document.querySelectorAll('input[name="receipt"]').forEach(radio=>{
    radio.addEventListener("change", e=>{
        if(!e.target.checked) return;
        settings.receiptStyle = e.target.value;
        updateReceiptOptionsUI();
        saveAll();
        refreshChat();
    });
});

$("min-wait").addEventListener("input", e=>{
    settings.minWait = parseFloat(e.target.value);
    if(settings.minWait > settings.maxWait){
        settings.maxWait = settings.minWait;
        $("max-wait").value = settings.maxWait;
        $("max-wait-val").textContent = settings.maxWait + "s";
    }
    $("min-wait-val").textContent = settings.minWait + "s";
    saveAll();
});

$("max-wait").addEventListener("input", e=>{
    settings.maxWait = parseFloat(e.target.value);
    if(settings.maxWait < settings.minWait){
        settings.maxWait = settings.minWait;
        e.target.value = settings.maxWait;
    }
    $("max-wait-val").textContent = settings.maxWait + "s";
    saveAll();
});

/* 塔罗 */
$("open-tarot").addEventListener("click", ()=>{
    closeOverlay("settings-main-overlay");
    openOverlay("tarot-overlay");
});
$("tarot-draw-btn").addEventListener("click", startTarotDraw);
$("tarot-back").addEventListener("click", ()=>{
    closeOverlay("tarot-overlay");
    openOverlay("settings-main-overlay");
});

/* 输入框聚焦时，手机端尽量滚到底 */
const scrollInputIntoView = ()=>{
    setTimeout(()=>{
        const container = $("messages-container");
        if(container) container.scrollTop = container.scrollHeight;
    }, 260);
};
$("message-input").addEventListener("focus", scrollInputIntoView);
$("message-input").addEventListener("click", scrollInputIntoView);

/* 点击浮层空白处关闭 */
document.querySelectorAll(".overlay").forEach(overlay=>{
    overlay.addEventListener("click", e=>{
        if(e.target === overlay) closeOverlay(overlay.id);
    });
});

/* ESC 关闭 */
document.addEventListener("keydown", e=>{
    if(e.key === "Escape"){
        const opened = [...document.querySelectorAll(".overlay.show")];
        if(opened.length){
            closeOverlay(opened[opened.length - 1].id);
        }
        hideMsgMenu();
    }
});
}

/* 修正：机器人随机表情包时，名称和图片要对应同一张 */
function scheduleRobotReply(contactId, myMsg){
    const min = Math.min(settings.minWait, settings.maxWait);
    const max = Math.max(settings.minWait, settings.maxWait);
    const wait = Math.random() * (max * 1000 - min * 1000) + min * 1000;

    setTimeout(()=>{
        const liveContact = contacts.find(c=>c.id === contactId);
        pendingReplies = Math.max(0, pendingReplies - 1);

        if(!liveContact){
            refreshChat();
            return;
        }

        myMsg.receipt = "read";

        const sticker = settings.robotStickerEnabled && stickers.length > 0 && Math.random() < .35
            ? getRandomSticker()
            : null;

        let replyMsg;
        if(sticker){
            replyMsg = {
                sender:"contact",
                type:"sticker",
                text:"",
                stickerSrc: sticker.src,
                stickerName: sticker.name || "表情包",
                time:getCurrentTime(),
                quote:null,
                receipt:null,
                edited:false
            };
        }else{
            replyMsg = {
                sender:"contact",
                type:"text",
                text:getRandomWordCardText(),
                stickerSrc:null,
                stickerName:"表情包",
                time:getCurrentTime(),
                quote:null,
                receipt:null,
                edited:false
            };
        }

        pushMessage(liveContact, replyMsg);
        saveAll();
        refreshChat();
    }, wait);
}

/* 启动 */
setupStartupScreen();
initData();
buildUI();
bindEvents();
renderThemeGrid();
syncColorInputs();
updateWordcardBatchBar();
renderStickerGrid();
applyBgAndFont();

const startupDelay = 1200 + Math.floor(Math.random() * 900);
window.addEventListener("load", ()=>{
    setTimeout(hideStartupScreen, startupDelay);
});
setTimeout(hideStartupScreen, 4800);

})();
</script>
