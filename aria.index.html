<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>字卡聊天 · 外观版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 100%;
            background: #fffaf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部工具栏 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: #fffaf3;
            border-bottom: 1px solid #eee6db;
        }
        .bot-info, .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bot-avatar, .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #d9cdbc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #4a3f35;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .bot-details, .user-details {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
            cursor: pointer;
        }
        .bot-name, .user-name {
            font-weight: 600;
            font-size: 16px;
            color: #4a3f35;
        }
        .bot-status, .user-status {
            font-size: 11px;
            color: #8e7e6e;
            background: #e3d9cf;
            padding: 2px 8px;
            border-radius: 30px;
            display: inline-block;
            width: fit-content;
        }
        .toolbar-icons {
            display: flex;
            gap: 16px;
        }
        .toolbar-icons button {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b5f53;
        }
        .toolbar-icons button:hover {
            background: #f0e8dd;
        }

        /* 聊天区 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-size: cover;
            background-position: center;
        }
        .message {
            display: flex;
            gap: 10px;
            max-width: 100%;
        }
        .message.user {
            flex-direction: row-reverse;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #d9cdbc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #4a3f35;
            background-size: cover;
            background-position: center;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .message-content {
            max-width: calc(100% - 60px);
            display: flex;
            flex-direction: column;
        }
        .user .message-content {
            align-items: flex-end;
        }
        .name-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            margin-bottom: 4px;
            color: #8e7e6e;
        }
        .user .name-status {
            flex-direction: row-reverse;
        }
        .name {
            font-weight: 500;
            color: #4f443b;
        }
        .status {
            background: #e3d9cf;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 10px;
            color: #5f5142;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
            background: white;
            border: 1px solid #ece2d7;
            border-bottom-left-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }
        .user .bubble {
            border-bottom-right-radius: 4px;
            border: none;
        }
        .time {
            font-size: 11px;
            color: #9f9285;
            margin-top: 4px;
        }

        /* 底部输入 */
        .input-area {
            background: #faf5ed;
            border-top: 1px solid #e7ded2;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            background: white;
            border: 1px solid #ddd0c0;
            border-radius: 40px;
            padding: 12px 18px;
            font-size: 15px;
            outline: none;
        }
        .input-area button {
            background: #b9aa98;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            color: white;
            cursor: pointer;
        }

        /* 模态框基础 */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #fffaf3;
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* 外观设置样式 */
        .appearance-section {
            margin-bottom: 24px;
            border-bottom: 1px solid #eee0d2;
            padding-bottom: 16px;
        }
        .appearance-section h4 {
            font-size: 16px;
            color: #4a3f35;
            margin-bottom: 12px;
        }
        .setting-item {
            margin-bottom: 16px;
        }
        .setting-item label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #7b6e60;
        }
        .file-upload {
            border: 1px dashed #b9aa98;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            background: #f8f1e8;
            cursor: pointer;
        }
        .preview-image {
            max-width: 60px;
            max-height: 60px;
            border-radius: 50%;
            margin-top: 8px;
            object-fit: cover;
        }
        .color-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .color-row input[type="color"] {
            width: 60px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .preview-messages {
            background: rgba(0,0,0,0.02);
            border-radius: 24px;
            padding: 16px;
            margin-top: 16px;
        }
        .preview-message {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .preview-message.user {
            flex-direction: row-reverse;
        }
        .preview-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #d9cdbc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background-size: cover;
        }
        .preview-bubble {
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 200px;
            font-size: 14px;
        }

        /* 字卡库管理模态框（竖版） */
        .manager-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .manager-header h3 {
            font-size: 18px;
            color: #4a3f35;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #b1a28f;
        }
        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid #eee0d2;
            padding-bottom: 8px;
            overflow-x: auto;
        }
        .category-tab {
            background: #ece2d7;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            color: #5f4f40;
        }
        .category-tab.active {
            background: #d6c5b2;
            font-weight: 500;
        }
        .card-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .card-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0e8de;
        }
        .card-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-text {
            font-size: 16px;
            color: #3a322b;
        }
        .card-group-tag {
            background: #e9dfd3;
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 10px;
            color: #7f6e5b;
        }
        .card-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .heart {
            font-size: 20px;
            cursor: pointer;
            color: #d9827a;
        }
        .delete-btn {
            font-size: 18px;
            cursor: pointer;
            color: #b5a48e;
        }
        .add-card-bar {
            display: flex;
            gap: 8px;
            border-top: 1px solid #efe5d9;
            padding-top: 16px;
        }
        .add-card-bar input {
            flex: 1;
            background: #f4ede5;
            border: 1px solid #e4d7c9;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
        }
        .add-card-bar select {
            border-radius: 40px;
            padding: 0 12px;
            border: 1px solid #e4d7c9;
            background: white;
        }
        .add-card-bar button {
            background: #d6c5b2;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        /* 基本设置模态框 */
        .settings-item {
            margin-bottom: 16px;
        }
        .settings-item label {
            display: block;
            margin-bottom: 6px;
            color: #7b6e60;
        }
        .settings-item input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd0c0;
            border-radius: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- 顶部工具栏 -->
    <div class="toolbar">
        <!-- 左侧：机器人信息 -->
        <div class="bot-info">
            <div class="bot-avatar" id="botAvatar">🤖</div>
            <div class="bot-details" id="editBotInfo">
                <span class="bot-name" id="botName">小四</span>
                <span class="bot-status" id="botStatus">在线</span>
            </div>
        </div>

        <!-- 中间：功能图标 -->
        <div class="toolbar-icons">
            <button id="openCardManagerBtn" title="字卡库管理">📚</button>
            <button id="openAppearanceBtn" title="外观设置">🎨</button>
            <button id="openSettingsBtn" title="基本设置">⚙️</button>
        </div>

        <!-- 右侧：我的信息 -->
        <div class="user-info">
            <div class="user-details" id="editUserInfo">
                <span class="user-name" id="userName">沉沉</span>
                <span class="user-status" id="userStatus">在线</span>
            </div>
            <div class="user-avatar" id="userAvatar">😊</div>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-area" id="chatArea"></div>

    <!-- 底部输入 -->
    <div class="input-area">
        <input type="text" id="messageInput" placeholder="写点什么..." maxlength="100">
        <button id="sendBtn">发送</button>
    </div>

    <!-- 隐藏文件输入，用于上传头像/背景 -->
    <input type="file" id="fileUpload" accept="image/*" style="display:none;">

    <!-- 字卡库管理模态框 -->
    <div class="modal" id="cardManagerModal">
        <div class="modal-content">
            <div class="manager-header">
                <h3>📇 字卡库管理</h3>
                <button class="close-btn" id="closeCardManager">&times;</button>
            </div>
            <div class="category-tabs" id="categoryTabs"></div>
            <div class="card-list" id="cardListManager"></div>
            <div class="add-card-bar">
                <input type="text" id="newCardInput" placeholder="新字卡...">
                <select id="newCardGroupSelect"></select>
                <button id="addCardBtn">添加</button>
            </div>
        </div>
    </div>

    <!-- 外观设置模态框 -->
    <div class="modal" id="appearanceModal">
        <div class="modal-content">
            <div class="manager-header">
                <h3>🎨 外观设置</h3>
                <button class="close-btn" id="closeAppearance">&times;</button>
            </div>

            <!-- 聊天背景 -->
            <div class="appearance-section">
                <h4>聊天背景</h4>
                <div class="setting-item">
                    <div class="file-upload" id="uploadBg">
                        <span>📷 上传背景图片 (≤2MB)</span>
                    </div>
                    <img id="bgPreview" class="preview-image" src="" style="display:none;">
                    <button id="clearBgBtn" style="margin-top:8px; background:#ece2d7; border:none; border-radius:30px; padding:6px 12px;">清除背景</button>
                </div>
            </div>

            <!-- 头像设置 -->
            <div class="appearance-section">
                <h4>头像</h4>
                <div class="setting-item">
                    <label>我的头像</label>
                    <div class="file-upload" id="uploadMyAvatar">
                        <span>📷 上传图片</span>
                    </div>
                    <img id="myAvatarPreview" class="preview-image" src="" style="display:none;">
                    <button id="resetMyAvatar" style="margin-top:8px; background:#ece2d7; border:none; border-radius:30px; padding:6px 12px;">恢复默认 😊</button>
                </div>
                <div class="setting-item">
                    <label>机器人头像</label>
                    <div class="file-upload" id="uploadBotAvatar">
                        <span>📷 上传图片</span>
                    </div>
                    <img id="botAvatarPreview" class="preview-image" src="" style="display:none;">
                    <button id="resetBotAvatar" style="margin-top:8px; background:#ece2d7; border:none; border-radius:30px; padding:6px 12px;">恢复默认 🤖</button>
                </div>
            </div>

            <!-- 气泡颜色 -->
            <div class="appearance-section">
                <h4>气泡颜色</h4>
                <div class="setting-item">
                    <label>我的气泡背景色</label>
                    <div class="color-row">
                        <input type="color" id="myBubbleBg" value="#d1e0d3">
                        <input type="text" id="myBubbleBgText" placeholder="#d1e0d3" value="#d1e0d3">
                    </div>
                </div>
                <div class="setting-item">
                    <label>我的字体颜色</label>
                    <div class="color-row">
                        <input type="color" id="myBubbleText" value="#1f3b2c">
                        <input type="text" id="myBubbleTextText" placeholder="#1f3b2c" value="#1f3b2c">
                    </div>
                </div>
                <div class="setting-item">
                    <label>机器人气泡背景色</label>
                    <div class="color-row">
                        <input type="color" id="botBubbleBg" value="#ffffff">
                        <input type="text" id="botBubbleBgText" placeholder="#ffffff" value="#ffffff">
                    </div>
                </div>
                <div class="setting-item">
                    <label>机器人字体颜色</label>
                    <div class="color-row">
                        <input type="color" id="botBubbleText" value="#2c2a27">
                        <input type="text" id="botBubbleTextText" placeholder="#2c2a27" value="#2c2a27">
                    </div>
                </div>
            </div>

            <!-- 预览区域 -->
            <div class="appearance-section">
                <h4>预览</h4>
                <div class="preview-messages" id="previewArea" style="background-size: cover; background-position: center;">
                    <div class="preview-message bot">
                        <div class="preview-avatar" id="previewBotAvatar">🤖</div>
                        <div class="preview-bubble" id="previewBotBubble">机器人回复示例</div>
                    </div>
                    <div class="preview-message user">
                        <div class="preview-bubble" id="previewUserBubble">你的消息示例</div>
                        <div class="preview-avatar" id="previewUserAvatar">😊</div>
                    </div>
                </div>
            </div>

            <button id="saveAppearance" style="width:100%; padding:12px; background:#b9aa98; border:none; border-radius:40px; color:white; font-size:16px;">保存设置</button>
        </div>
    </div>

    <!-- 基本设置模态框 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="manager-header">
                <h3>⚙️ 基本设置</h3>
                <button class="close-btn" id="closeSettings">&times;</button>
            </div>
            <div class="settings-item">
                <label>机器人回复速度（秒）</label>
                <input type="number" id="replySpeed" min="1" max="120" value="3">
            </div>
            <div class="settings-item">
                <label>已读样式</label>
                <select id="readStyle">
                    <option value="text">文字“已读”</option>
                    <option value="doublecheck">双钩 ✓✓</option>
                </select>
            </div>
            <button id="saveSettings" style="width:100%; padding:12px; background:#b9aa98; border:none; border-radius:40px; color:white; font-size:16px;">保存</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // 存储key
        const STORAGE_CARDS = 'cards';
        const STORAGE_GROUPS = 'groups';
        const STORAGE_CHAT = 'chat';
        const STORAGE_SETTINGS = 'settings';
        const STORAGE_BOT = 'botInfo';
        const STORAGE_USER = 'userInfo';
        const STORAGE_APPEARANCE = 'appearance';

        // 默认数据
        const DEFAULT_GROUPS = ['默认', 'Emoji', '表情库'];
        const DEFAULT_CARDS = [
            { text: '不来找我(⌐□_□)♡', group: '默认', favorite: true },
            { text: '纤维', group: '默认', favorite: false },

            { text: '别喝冰的', group: '默认', favorite: false },
            { text: '你是不是在骗我', group: '默认', favorite: false },
            { text: '骗我', group: '默认', favorite: false },

            { text: '听了', group: '默认', favorite: false }
        ];
        const DEFAULT_CHAT = [
            { role: 'bot', content: '嗨！往字卡库里加点东西吧，我会随机回复哦', time: '00:00' }
        ];
        const DEFAULT_SETTINGS = {
            replySpeed: 3,
            readStyle: 'text'
        };
        const DEFAULT_BOT = { name: '小四', avatar: '🤖', status: '在线' };
        const DEFAULT_USER = { name: '沉沉', avatar: '😊', status: '在线' };
        const DEFAULT_APPEARANCE = {
            bgImage: null,
            myBubbleBg: '#d1e0d3',
            myBubbleText: '#1f3b2c',
            botBubbleBg: '#ffffff',
            botBubbleText: '#2c2a27'
        };

        // 当前状态
        let groups = [];
        let cards = [];
        let chatMessages = [];
        let settings = {};
        let botInfo = {};
        let userInfo = {};
        let appearance = {};
        let currentCategory = '全部';

        // DOM
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const openCardManagerBtn = document.getElementById('openCardManagerBtn');
        const cardManagerModal = document.getElementById('cardManagerModal');
        const closeCardManager = document.getElementById('closeCardManager');
        const categoryTabs = document.getElementById('categoryTabs');
        const cardListManager = document.getElementById('cardListManager');
        const newCardInput = document.getElementById('newCardInput');
        const newCardGroupSelect = document.getElementById('newCardGroupSelect');
        const addCardBtn = document.getElementById('addCardBtn');
        const openAppearanceBtn = document.getElementById('openAppearanceBtn');
        const appearanceModal = document.getElementById('appearanceModal');
        const closeAppearance = document.getElementById('closeAppearance');
        const openSettingsBtn = document.getElementById('openSettingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const replySpeedInput = document.getElementById('replySpeed');
        const readStyleSelect = document.getElementById('readStyle');
        const saveSettingsBtn = document.getElementById('saveSettings');
        const editBotInfo = document.getElementById('editBotInfo');
        const editUserInfo = document.getElementById('editUserInfo');
        const botAvatar = document.getElementById('botAvatar');
        const botName = document.getElementById('botName');
        const botStatus = document.getElementById('botStatus');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const userStatus = document.getElementById('userStatus');
        const fileUpload = document.getElementById('fileUpload');

        // 外观设置DOM
        const uploadBg = document.getElementById('uploadBg');
        const bgPreview = document.getElementById('bgPreview');
        const clearBgBtn = document.getElementById('clearBgBtn');
        const uploadMyAvatar = document.getElementById('uploadMyAvatar');
        const myAvatarPreview = document.getElementById('myAvatarPreview');
        const resetMyAvatar = document.getElementById('resetMyAvatar');
        const uploadBotAvatar = document.getElementById('uploadBotAvatar');
        const botAvatarPreview = document.getElementById('botAvatarPreview');
        const resetBotAvatar = document.getElementById('resetBotAvatar');
        const myBubbleBg = document.getElementById('myBubbleBg');
        const myBubbleBgText = document.getElementById('myBubbleBgText');
        const myBubbleText = document.getElementById('myBubbleText');
        const myBubbleTextText = document.getElementById('myBubbleTextText');
        const botBubbleBg = document.getElementById('botBubbleBg');
        const botBubbleBgText = document.getElementById('botBubbleBgText');
        const botBubbleText = document.getElementById('botBubbleText');
        const botBubbleTextText = document.getElementById('botBubbleTextText');
        const previewArea = document.getElementById('previewArea');
        const previewBotAvatar = document.getElementById('previewBotAvatar');
        const previewBotBubble = document.getElementById('previewBotBubble');
        const previewUserAvatar = document.getElementById('previewUserAvatar');
        const previewUserBubble = document.getElementById('previewUserBubble');
        const saveAppearance = document.getElementById('saveAppearance');

        let currentUploadTarget = null; // 'bg', 'myAvatar', 'botAvatar'

        // ---------- 数据加载 ----------
        function loadData() {
            groups = JSON.parse(localStorage.getItem(STORAGE_GROUPS)) || DEFAULT_GROUPS;
            cards = JSON.parse(localStorage.getItem(STORAGE_CARDS)) || DEFAULT_CARDS;
            chatMessages = JSON.parse(localStorage.getItem(STORAGE_CHAT)) || DEFAULT_CHAT;
            settings = JSON.parse(localStorage.getItem(STORAGE_SETTINGS)) || DEFAULT_SETTINGS;
            botInfo = JSON.parse(localStorage.getItem(STORAGE_BOT)) || DEFAULT_BOT;
            userInfo = JSON.parse(localStorage.getItem(STORAGE_USER)) || DEFAULT_USER;
            appearance = JSON.parse(localStorage.getItem(STORAGE_APPEARANCE)) || DEFAULT_APPEARANCE;

            // 更新顶部显示
            updateTopBar();
            // 应用外观
            applyAppearance();
        }

        function saveGroups() { localStorage.setItem(STORAGE_GROUPS, JSON.stringify(groups)); }
        function saveCards() { localStorage.setItem(STORAGE_CARDS, JSON.stringify(cards)); }
        function saveChat() { localStorage.setItem(STORAGE_CHAT, JSON.stringify(chatMessages)); }
        function saveSettings() { localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings)); }
        function saveBotInfo() { localStorage.setItem(STORAGE_BOT, JSON.stringify(botInfo)); }
        function saveUserInfo() { localStorage.setItem(STORAGE_USER, JSON.stringify(userInfo)); }
        function saveAppearance() { localStorage.setItem(STORAGE_APPEARANCE, JSON.stringify(appearance)); }

        // 更新顶部栏
        function updateTopBar() {
            if (botInfo.avatar && botInfo.avatar.startsWith('data:')) {
                botAvatar.style.backgroundImage = `url('${botInfo.avatar}')`;
                botAvatar.textContent = '';
            } else {
                botAvatar.style.backgroundImage = '';
                botAvatar.textContent = botInfo.avatar || '🤖';
            }
            botName.textContent = botInfo.name;
            botStatus.textContent = botInfo.status;

            if (userInfo.avatar && userInfo.avatar.startsWith('data:')) {
                userAvatar.style.backgroundImage = `url('${userInfo.avatar}')`;
                userAvatar.textContent = '';
            } else {
                userAvatar.style.backgroundImage = '';
                userAvatar.textContent = userInfo.avatar || '😊';
            }
            userName.textContent = userInfo.name;
            userStatus.textContent = userInfo.status;
        }

        // 应用外观设置
        function applyAppearance() {
            if (appearance.bgImage) {
                chatArea.style.backgroundImage = `url('${appearance.bgImage}')`;
            } else {
                chatArea.style.backgroundImage = '';
            }
            // 颜色在渲染消息时使用
            renderChat();
        }

        // 时间格式化
        function getCurrentTime() {
            const d = new Date();
            return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }

        // 渲染聊天
        function renderChat() {
            chatArea.innerHTML = '';
            chatMessages.forEach(msg => {
                const isUser = msg.role === 'user';
                const sender = isUser ? userInfo : botInfo;

                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isUser ? 'user' : ''}`;

                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'avatar';
                if (sender.avatar && sender.avatar.startsWith('data:')) {
                    avatarDiv.style.backgroundImage = `url('${sender.avatar}')`;
                    avatarDiv.textContent = '';
                } else {
                    avatarDiv.textContent = sender.avatar || (isUser ? '😊' : '🤖');
                }

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';

                const nameStatusDiv = document.createElement('div');
                nameStatusDiv.className = 'name-status';
                nameStatusDiv.innerHTML = `<span class="name">${sender.name}</span><span class="status">${sender.status}</span>`;

                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'bubble';
                bubbleDiv.textContent = msg.content;
                // 应用颜色
                if (isUser) {
                    bubbleDiv.style.backgroundColor = appearance.myBubbleBg;
                    bubbleDiv.style.color = appearance.myBubbleText;
                } else {
                    bubbleDiv.style.backgroundColor = appearance.botBubbleBg;
                    bubbleDiv.style.color = appearance.botBubbleText;
                }

                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                timeDiv.textContent = msg.time;

                contentDiv.appendChild(nameStatusDiv);
                contentDiv.appendChild(bubbleDiv);
                contentDiv.appendChild(timeDiv);

                msgDiv.appendChild(avatarDiv);
                msgDiv.appendChild(contentDiv);
                chatArea.appendChild(msgDiv);
            });
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 发送消息
        function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            const time = getCurrentTime();
            chatMessages.push({ role: 'user', content, time });
            saveChat();
            renderChat();
            messageInput.value = '';

            // 机器人回复
            setTimeout(() => {
                let reply = '字卡库空空～';
                if (cards.length > 0) {
                    const randomCard = cards[Math.floor(Math.random() * cards.length)];
                    reply = randomCard.text;
                }
                const replyTime = getCurrentTime();
                chatMessages.push({ role: 'bot', content: reply, time: replyTime });
                saveChat();
                renderChat();
            }, settings.replySpeed * 1000);
        }

        // ---------- 文件上传 ----------
        function handleFileUpload(target) {
            currentUploadTarget = target;
            fileUpload.click();
        }

        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                alert('图片不能超过2MB');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(ev) {
                const dataUrl = ev.target.result;
                if (currentUploadTarget === 'bg') {
                    appearance.bgImage = dataUrl;
                    bgPreview.src = dataUrl;
                    bgPreview.style.display = 'inline-block';
                    applyAppearance();
                } else if (currentUploadTarget === 'myAvatar') {
                    userInfo.avatar = dataUrl;
                    myAvatarPreview.src = dataUrl;
                    myAvatarPreview.style.display = 'inline-block';
                    saveUserInfo();
                    updateTopBar();
                } else if (currentUploadTarget === 'botAvatar') {
                    botInfo.avatar = dataUrl;
                    botAvatarPreview.src = dataUrl;
                    botAvatarPreview.style.display = 'inline-block';
                    saveBotInfo();
                    updateTopBar();
                }
                // 更新预览
                updatePreview();
            };
            reader.readAsDataURL(file);
            fileUpload.value = '';
        });

        // 清除背景
        function clearBg() {
            appearance.bgImage = null;
            bgPreview.style.display = 'none';
            applyAppearance();
            updatePreview();
        }

        // 恢复默认头像
        function resetAvatar(type) {
            if (type === 'my') {
                userInfo.avatar = DEFAULT_USER.avatar;
                myAvatarPreview.style.display = 'none';
                saveUserInfo();
            } else {
                botInfo.avatar = DEFAULT_BOT.avatar;
                botAvatarPreview.style.display = 'none';
                saveBotInfo();
            }
            updateTopBar();
            updatePreview();
        }

        // 更新预览区域
        function updatePreview() {
            // 预览头像
            if (userInfo.avatar && userInfo.avatar.startsWith('data:')) {
                previewUserAvatar.style.backgroundImage = `url('${userInfo.avatar}')`;
                previewUserAvatar.textContent = '';
            } else {
                previewUserAvatar.style.backgroundImage = '';
                previewUserAvatar.textContent = userInfo.avatar || '😊';
            }
            if (botInfo.avatar && botInfo.avatar.startsWith('data:')) {
                previewBotAvatar.style.backgroundImage = `url('${botInfo.avatar}')`;
                previewBotAvatar.textContent = '';
            } else {
                previewBotAvatar.style.backgroundImage = '';
                previewBotAvatar.textContent = botInfo.avatar || '🤖';
            }
            // 预览气泡颜色
            previewUserBubble.style.backgroundColor = myBubbleBg.value;
            previewUserBubble.style.color = myBubbleText.value;
            previewBotBubble.style.backgroundColor = botBubbleBg.value;
            previewBotBubble.style.color = botBubbleText.value;
            // 预览背景
            if (appearance.bgImage) {
                previewArea.style.backgroundImage = `url('${appearance.bgImage}')`;
            } else {
                previewArea.style.backgroundImage = '';
            }
        }

        // 打开外观设置，填充当前值
        function openAppearance() {
            // 填充背景预览
            if (appearance.bgImage) {
                bgPreview.src = appearance.bgImage;
                bgPreview.style.display = 'inline-block';
            } else {
                bgPreview.style.display = 'none';
            }
            // 头像预览
            if (userInfo.avatar && userInfo.avatar.startsWith('data:')) {
                myAvatarPreview.src = userInfo.avatar;
                myAvatarPreview.style.display = 'inline-block';
            } else {
                myAvatarPreview.style.display = 'none';
            }
            if (botInfo.avatar && botInfo.avatar.startsWith('data:')) {
                botAvatarPreview.src = botInfo.avatar;
                botAvatarPreview.style.display = 'inline-block';
            } else {
                botAvatarPreview.style.display = 'none';
            }
            // 颜色值
            myBubbleBg.value = appearance.myBubbleBg;
            myBubbleBgText.value = appearance.myBubbleBg;
            myBubbleText.value = appearance.myBubbleText;
            myBubbleTextText.value = appearance.myBubbleText;
            botBubbleBg.value = appearance.botBubbleBg;
            botBubbleBgText.value = appearance.botBubbleBg;
            botBubbleText.value = appearance.botBubbleText;
            botBubbleTextText.value = appearance.botBubbleText;

            updatePreview();
            appearanceModal.classList.add('show');
        }

        // 保存外观设置
        function saveAppearanceSettings() {
            appearance.myBubbleBg = myBubbleBg.value;
            appearance.myBubbleText = myBubbleText.value;
            appearance.botBubbleBg = botBubbleBg.value;
            appearance.botBubbleText = botBubbleText.value;
            // bgImage 已经在上传时保存到 appearance 对象，无需再取
            saveAppearance();
            applyAppearance();
            renderChat(); // 重新渲染聊天以应用新颜色
            appearanceModal.classList.remove('show');
        }

        // 同步颜色选择器和文本框
        function syncColor(inputColor, inputText) {
            inputColor.addEventListener('input', () => {
                inputText.value = inputColor.value;
                updatePreview();
            });
            inputText.addEventListener('input', () => {
                inputColor.value = inputText.value;
                updatePreview();
            });
        }

        // ---------- 字卡库管理 ----------
        function renderCardManager() {
            categoryTabs.innerHTML = '';
            const allTab = document.createElement('button');
            allTab.className = `category-tab ${currentCategory === '全部' ? 'active' : ''}`;
            allTab.textContent = '全部';
            allTab.addEventListener('click', () => { currentCategory = '全部'; renderCardManager(); });
            categoryTabs.appendChild(allTab);

            groups.forEach(group => {
                const tab = document.createElement('button');
                tab.className = `category-tab ${currentCategory === group ? 'active' : ''}`;
                tab.textContent = group;
                tab.addEventListener('click', () => { currentCategory = group; renderCardManager(); });
                categoryTabs.appendChild(tab);
            });

            let filtered = cards;
            if (currentCategory !== '全部') {
                filtered = cards.filter(c => c.group === currentCategory);
            }

            cardListManager.innerHTML = '';
            filtered.forEach(card => {
                const item = document.createElement('div');
                item.className = 'card-item';
                item.innerHTML = `
                    <div class="card-left">
                        <span class="card-text">${card.text}</span>
                        <span class="card-group-tag">${card.group}</span>
                    </div>
                    <div class="card-right">
                        <span class="heart">${card.favorite ? '❤️' : '♡'}</span>
                        <span class="delete-btn">🗑️</span>
                    </div>
                `;
                const heart = item.querySelector('.heart');
                heart.addEventListener('click', () => {
                    card.favorite = !card.favorite;
                    saveCards();
                    renderCardManager();
                });
                const del = item.querySelector('.delete-btn');
                del.addEventListener('click', () => {
                    cards = cards.filter(c => !(c.text === card.text && c.group === card.group));
                    saveCards();
                    renderCardManager();
                });
                cardListManager.appendChild(item);
            });

            newCardGroupSelect.innerHTML = '';
            groups.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                newCardGroupSelect.appendChild(opt);
            });
        }

        function addCard() {
            const text = newCardInput.value.trim();
            const group = newCardGroupSelect.value;
            if (!text) return;
            if (cards.some(c => c.text === text && c.group === group)) {
                alert('字卡已存在');
                return;
            }
            cards.push({ text, group, favorite: false });
            saveCards();
            renderCardManager();
            newCardInput.value = '';
        }

        // 编辑名字/状态
        function editInfo(type) {
            const isBot = type === 'bot';
            const current = isBot ? botInfo : userInfo;
            const newName = prompt('输入新名字', current.name);
            if (newName !== null) current.name = newName.trim() || current.name;
            const newStatus = prompt('输入新状态', current.status);
            if (newStatus !== null) current.status = newStatus.trim() || current.status;
            if (isBot) saveBotInfo(); else saveUserInfo();
            updateTopBar();
            renderChat();
        }

        // 事件绑定
        function bindEvents() {
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // 头像点击上传
            botAvatar.addEventListener('click', () => handleFileUpload('botAvatar'));
            userAvatar.addEventListener('click', () => handleFileUpload('myAvatar'));

            // 名字/状态点击编辑
            editBotInfo.addEventListener('click', () => editInfo('bot'));
            editUserInfo.addEventListener('click', () => editInfo('user'));

            // 字卡库管理
            openCardManagerBtn.addEventListener('click', () => {
                currentCategory = '全部';
                renderCardManager();
                cardManagerModal.classList.add('show');
            });
            closeCardManager.addEventListener('click', () => cardManagerModal.classList.remove('show'));
            cardManagerModal.addEventListener('click', (e) => {
                if (e.target === cardManagerModal) cardManagerModal.classList.remove('show');
            });
            addCardBtn.addEventListener('click', addCard);
            newCardInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addCard();
            });

            // 外观设置
            openAppearanceBtn.addEventListener('click', openAppearance);
            closeAppearance.addEventListener('click', () => appearanceModal.classList.remove('show'));
            appearanceModal.addEventListener('click', (e) => {
                if (e.target === appearanceModal) appearanceModal.classList.remove('show');
            });
            uploadBg.addEventListener('click', () => handleFileUpload('bg'));
            clearBgBtn.addEventListener('click', clearBg);
            uploadMyAvatar.addEventListener('click', () => handleFileUpload('myAvatar'));
            resetMyAvatar.addEventListener('click', () => resetAvatar('my'));
            uploadBotAvatar.addEventListener('click', () => handleFileUpload('botAvatar'));
            resetBotAvatar.addEventListener('click', () => resetAvatar('bot'));
            saveAppearance.addEventListener('click', saveAppearanceSettings);

            // 颜色同步
            syncColor(myBubbleBg, myBubbleBgText);
            syncColor(myBubbleText, myBubbleTextText);
            syncColor(botBubbleBg, botBubbleBgText);
            syncColor(botBubbleText, botBubbleTextText);

            // 基本设置
            openSettingsBtn.addEventListener('click', () => {
                replySpeedInput.value = settings.replySpeed;
                readStyleSelect.value = settings.readStyle;
                settingsModal.classList.add('show');
            });
            closeSettings.addEventListener('click', () => settingsModal.classList.remove('show'));
            settingsModal.addEventListener('click', (e) => {
                if (e.target === settingsModal) settingsModal.classList.remove('show');
            });
            saveSettingsBtn.addEventListener('click', () => {
                settings.replySpeed = parseInt(replySpeedInput.value) || 3;
                settings.readStyle = readStyleSelect.value;
                saveSettings();
                settingsModal.classList.remove('show');
            });
        }

        // 初始化
        function init() {
            loadData();
            renderChat();
            bindEvents();
        }

        init();
    })();
</script>
</body>
</html>
